<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab de Redes Interativo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Efeitos visuais avançados para a simulação */
        .glow-active { box-shadow: 0 0 20px 5px rgba(16, 185, 129, 0.5); border-color: #10b981; transition: all 0.3s; }
        .linha-conexao { height: 4px; background: #334155; transition: background 0.5s; position: relative; overflow: hidden; }
        .pacote-dados { position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, #10b981, transparent); animation: transfer 1s linear forwards; display: none; }
        
        @keyframes transfer {
            0% { left: -50%; }
            100% { left: 100%; }
        }
        
        /* Terminal Hacker */
        .cursor-blink { border-right: 2px solid #22c55e; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { border-color: transparent; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen p-4 md:p-10 flex flex-col items-center">

    <header class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-500 mb-3">
            Infraestrutura como Código
        </h1>
        <p class="text-slate-400 font-mono text-sm md:text-base">Simulação de Roteamento Estático: VLAN 10 ➔ VLAN 20</p>
    </header>

    <div class="w-full max-w-5xl flex flex-col md:flex-row items-center justify-between relative mb-12">
        
        <div id="node-pc" class="z-10 bg-slate-900 border-2 border-slate-700 p-6 rounded-xl w-full md:w-1/4 text-center transition-all duration-300">
            <div class="text-4xl mb-2">💻</div>
            <h3 class="font-bold text-lg text-blue-400">PC Cliente</h3>
            <p class="font-mono text-xs text-slate-500 mt-2">IP: 192.168.1.10</p>
            <p class="font-mono text-xs text-slate-500">GW: 192.168.1.254</p>
        </div>

        <div class="linha-conexao w-2 flex-grow md:w-auto md:flex-grow mx-2 my-4 md:my-0 rounded">
            <div id="pacote-1" class="pacote-dados"></div>
        </div>

        <div id="node-router" class="z-10 bg-slate-900 border-2 border-slate-700 p-6 rounded-xl w-full md:w-1/3 text-center transition-all duration-300 relative">
            <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-amber-500/20 text-amber-400 text-[10px] font-bold px-2 py-1 rounded border border-amber-500/50">
                IP Forwarding = 1
            </div>
            <div class="text-5xl mb-2">🎛️</div>
            <h3 class="font-bold text-lg text-amber-400">Roteador Alpine</h3>
            <div class="flex justify-between mt-3 text-[10px] font-mono text-slate-400 bg-slate-950 p-2 rounded">
                <span>eth0: .1.254</span>
                <span>eth1: .2.254</span>
            </div>
        </div>

        <div class="linha-conexao w-2 flex-grow md:w-auto md:flex-grow mx-2 my-4 md:my-0 rounded">
            <div id="pacote-2" class="pacote-dados"></div>
        </div>

        <div id="node-server" class="z-10 bg-slate-900 border-2 border-slate-700 p-6 rounded-xl w-full md:w-1/4 text-center transition-all duration-300">
            <div class="text-4xl mb-2">🖥️</div>
            <h3 class="font-bold text-lg text-purple-400">Servidor Nginx</h3>
            <p class="font-mono text-xs text-slate-500 mt-2">IP: 192.168.2.10</p>
            <p class="font-mono text-xs text-slate-500">GW: 192.168.2.254</p>
        </div>
    </div>

    <button id="btn-simular" class="mb-8 px-8 py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-lg shadow-[0_0_15px_rgba(16,185,129,0.5)] transition-all transform hover:scale-105 active:scale-95 cursor-pointer flex items-center gap-2">
        <span>▶</span> Disparar Requisição HTTP
    </button>

    <div class="w-full max-w-3xl bg-black rounded-lg border border-slate-800 shadow-2xl overflow-hidden">
        <div class="bg-slate-900 px-4 py-2 flex items-center gap-2 border-b border-slate-800">
            <div class="w-3 h-3 rounded-full bg-red-500"></div>
            <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div class="w-3 h-3 rounded-full bg-green-500"></div>
            <span class="text-xs text-slate-500 ml-2 font-mono">user@lab_pc1: ~</span>
        </div>
        <div class="p-6 font-mono text-sm h-64 overflow-y-auto">
            <div id="terminal-content" class="text-green-400 space-y-1">
                <p class="text-slate-500"># Aguardando comandos...</p>
            </div>
            <span id="cursor" class="cursor-blink inline-block w-2 h-4 bg-green-400 ml-1 mt-1 hidden"></span>
        </div>
    </div>

    <script>
        const btnSimular = document.getElementById('btn-simular');
        const terminalContent = document.getElementById('terminal-content');
        const cursor = document.getElementById('cursor');
        
        // Elementos visuais
        const pc = document.getElementById('node-pc');
        const router = document.getElementById('node-router');
        const server = document.getElementById('node-server');
        const pacote1 = document.getElementById('pacote-1');
        const pacote2 = document.getElementById('pacote-2');

        const linhasSimulacao = [
            { text: "$ docker exec lab_pc1 curl -I http://192.168.2.10", color: "text-white", delay: 500, action: "start" },
            { text: "> Resolvendo rota via Gateway Padrão (192.168.1.254)...", color: "text-slate-400", delay: 800 },
            { text: "> Pacote atingiu o Roteador. Verificando tabela de rotas...", color: "text-amber-400", delay: 1000, action: "router" },
            { text: "> Roteamento IP habilitado! Repassando para VLAN 20...", color: "text-amber-400", delay: 800 },
            { text: "> Servidor Nginx alcançado. Processando requisição...", color: "text-purple-400", delay: 1200, action: "server" },
            { text: "HTTP/1.1 200 OK", color: "text-green-400 font-bold mt-4", delay: 200 },
            { text: "Server: nginx/1.25.3 (Alpine)", color: "text-green-400", delay: 100 },
            { text: "Connection: keep-alive", color: "text-green-400", delay: 100 },
            { text: "Content-Type: text/html", color: "text-green-400", delay: 400 },
            { text: "✅ Conexão bem-sucedida através de sub-redes isoladas!", color: "text-emerald-300 font-bold mt-4", delay: 0, action: "finish" }
        ];

        async function typeLine(linhaInfo) {
            return new Promise(resolve => {
                setTimeout(() => {
                    const p = document.createElement('p');
                    p.className = linhaInfo.color;
                    p.textContent = linhaInfo.text;
                    terminalContent.appendChild(p);
                    terminalContent.scrollTop = terminalContent.scrollHeight; // Auto-scroll
                    resolve();
                }, linhaInfo.delay);
            });
        }

        btnSimular.addEventListener('click', async () => {
            // Resetar
            btnSimular.disabled = true;
            btnSimular.classList.add('opacity-50', 'cursor-not-allowed');
            terminalContent.innerHTML = '';
            cursor.classList.remove('hidden');
            pc.classList.remove('glow-active');
            router.classList.remove('glow-active');
            server.classList.remove('glow-active');

            // Iniciar simulação visual e de terminal
            for (let i = 0; i < linhasSimulacao.length; i++) {
                const step = linhasSimulacao[i];
                
                if (step.action === "start") {
                    pc.classList.add('glow-active');
                    pacote1.style.display = 'block';
                    
                    // Reiniciar animação
                    pacote1.style.animation = 'none';
                    pacote1.offsetHeight; 
                    pacote1.style.animation = 'transfer 1s linear forwards';
                }
                
                if (step.action === "router") {
                    pc.classList.remove('glow-active');
                    router.classList.add('glow-active');
                    pacote1.style.display = 'none';
                    pacote2.style.display = 'block';
                    
                    pacote2.style.animation = 'none';
                    pacote2.offsetHeight; 
                    pacote2.style.animation = 'transfer 1.2s linear forwards';
                }

                if (step.action === "server") {
                    router.classList.remove('glow-active');
                    server.classList.add('glow-active');
                    setTimeout(() => { pacote2.style.display = 'none'; }, 1000);
                }

                if (step.action === "finish") {
                    server.classList.remove('glow-active');
                    pc.classList.add('glow-active');
                    router.classList.add('glow-active');
                    server.classList.add('glow-active');
                }

                await typeLine(step);
            }

            cursor.classList.add('hidden');
            btnSimular.disabled = false;
            btnSimular.classList.remove('opacity-50', 'cursor-not-allowed');
            
            // Apaga as luzes depois de 3 segundos
            setTimeout(() => {
                pc.classList.remove('glow-active');
                router.classList.remove('glow-active');
                server.classList.remove('glow-active');
            }, 3000);
        });
    </script>
</body>
</html>
